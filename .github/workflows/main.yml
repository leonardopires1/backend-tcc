name: Release

on: 
  push:
    branches: [ main ]  # Especificar branch para evitar deploys desnecessários

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'  # ou a versão que você usa
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: projetoscti.com.br
        username: eq3ini3b
        password: ${{ secrets.ftp_password }}
        server-dir: ./api/
        local-dir: ./dist/  # Apenas os arquivos buildados
        port: 4026
